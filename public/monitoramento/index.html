<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script type="module" crossorigin src="/monitoramento/assets/index-xH-p0FqE.js"></script>
    <link rel="stylesheet" crossorigin href="/monitoramento/assets/index-DltJxpzO.css">
    <style>
      @media print {
        /* Hide non-essential UI elements */
        button, 
        .btn,
        nav, 
        aside, 
        header,
        footer,
        .sidebar,
        .menu,
        .no-print,
        [role="button"],
        input,
        select,
        .search-bar,
        .filter-section,
        .modal-close,
        .add-button {
          display: none !important;
        }

        /* Reset background and text colors for paper */
        body, html, #root, main {
          background-color: white !important;
          color: black !important;
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
        }

        /* Ensure cards and tables take full width */
        .card, .container, .section, table, .grid {
          width: 100% !important;
          max-width: none !important;
          box-shadow: none !important;
          border: 1px solid #eee !important;
          margin-bottom: 20px !important;
          page-break-inside: avoid;
        }

        /* Specialized fixes for labels and values */
        .label { color: #555 !important; font-weight: bold !important; }
        .value { color: #000 !important; }

        /* Actions list styling */
        .actions-list li, .action-item {
          border-bottom: 1px solid #eee !important;
          padding: 10px 0 !important;
        }

        /* Remove fixed positions during print */
        .fixed, .sticky {
          position: relative !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
